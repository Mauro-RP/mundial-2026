<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Copa Mundial 2026 — Tracker</title>
<style>
:root{
  --bg:#0b0e17;--s1:#131724;--s2:#1b1f30;--s3:#232840;--s4:#2c3150;
  --gold:#d4a843;--gold2:#f0c860;
  --win-bg:rgba(22,163,74,.15);--win-t:#4ade80;
  --draw-bg:rgba(202,138,4,.15);--draw-t:#facc15;
  --loss-bg:rgba(220,38,38,.12);--loss-t:#f87171;
  --text:#e8eaf0;--muted:#6b7296;--border:#1e2338;--blue:#5b9bd5;--blue-t:#93c5fd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;min-height:100vh}
header{background:linear-gradient(135deg,#0b0e17,#141028 50%,#0b0e17);border-bottom:2px solid var(--gold);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hl{display:flex;align-items:center;gap:12px}
header h1{font-size:1.15rem;color:var(--gold);font-weight:800;letter-spacing:2px;text-transform:uppercase}
header p{font-size:.65rem;color:var(--muted);letter-spacing:1px;margin-top:2px}
.htroph{font-size:1.8rem}
.btn-reset{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:5px;cursor:pointer;font-size:.65rem}
.btn-reset:hover{border-color:var(--gold);color:var(--gold)}
nav{background:var(--s1);border-bottom:1px solid var(--border);display:flex;position:sticky;top:60px;z-index:99}
nav button{flex:1;padding:11px 6px;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:all .2s}
nav button.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(212,168,67,.06)}
nav button:hover:not(.active){color:var(--text);background:var(--s2)}
.tab{display:none;padding:16px}.tab.active{display:block}

/* GROUPS */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.gc{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.gh{background:linear-gradient(90deg,var(--s2),var(--s3));padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.gl{font-size:1rem;font-weight:900;color:var(--gold);letter-spacing:1px}
.gs{font-size:.6rem;color:var(--muted);background:var(--s1);padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
.st{width:100%;border-collapse:collapse;font-size:.72rem}
.st th{background:var(--s2);color:var(--muted);padding:4px 5px;text-align:center;font-size:.6rem;letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.st th.l{text-align:left;padding-left:8px}
.st td{padding:5px 5px;text-align:center;border-bottom:1px solid rgba(30,35,56,.6)}
.st td.l{text-align:left;padding-left:6px}
.st tr:last-child td{border-bottom:none}
.st tr:hover td{background:rgba(255,255,255,.03)}
.st tr.q1 td{border-left:3px solid var(--gold)}.st tr.q1 td:first-child{padding-left:4px}
.st tr.q2 td{border-left:3px solid var(--blue)}.st tr.q2 td:first-child{padding-left:4px}
.st tr.q3 td{border-left:3px solid var(--draw-t)}.st tr.q3 td:first-child{padding-left:4px}
.pts{font-weight:800;color:var(--gold)}
.tname{display:flex;align-items:center;gap:5px;white-space:nowrap}
.tnm{max-width:100px;overflow:hidden;text-overflow:ellipsis;font-size:.72rem}
.gd-p{color:var(--win-t)}.gd-n{color:var(--loss-t)}.gd-z{color:var(--muted)}

/* MATCHES */
.mwrap{padding:6px 8px}
.jd{font-size:.58rem;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;padding:5px 2px 2px;margin-top:2px}
.mr{display:flex;align-items:center;padding:4px 5px;border-radius:5px;cursor:pointer;transition:background .15s;gap:3px;margin-bottom:2px;position:relative}
.mr:hover{background:var(--s2)}
.mt{display:flex;align-items:center;gap:4px;flex:1;font-size:.68rem;overflow:hidden}
.mt.aw{justify-content:flex-end;text-align:right}
.mt .mn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:78px}
.msc{flex-shrink:0;width:60px;text-align:center;font-weight:700;font-size:.78rem;background:var(--s3);border-radius:4px;padding:3px 4px;color:var(--gold);border:1px solid var(--border)}
.msc.unp{color:var(--muted);font-weight:400;font-size:.7rem}
.msc.approx{color:var(--draw-t)}
.ibtn{flex-shrink:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;padding:0 2px;line-height:1;border-radius:3px;transition:color .15s}
.ibtn:hover{color:var(--blue-t);background:var(--s3)}
.infopop{background:var(--s2);border:1px solid var(--s4);border-radius:6px;padding:8px 12px;font-size:.68rem;color:var(--muted);line-height:1.7;margin:0 4px 4px}
.infopop .ip-d{color:var(--text)}.infopop .ip-a{color:var(--draw-t);font-size:.6rem}

/* BADGE */
.badge{display:inline-block;font-size:.6rem;padding:2px 6px;border-radius:3px;font-weight:700}
.bok{background:var(--win-bg);color:var(--win-t)}.b3{background:var(--draw-bg);color:var(--draw-t)}.bout{background:var(--loss-bg);color:var(--loss-t)}

/* CLASIFICADOS */
.st2{width:100%;border-collapse:collapse;font-size:.72rem}
.st2 th{background:var(--s2);color:var(--muted);padding:5px 8px;text-align:center;font-size:.6rem;text-transform:uppercase;letter-spacing:.4px}
.st2 th.l2{text-align:left}
.st2 td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:center}
.st2 td.l2{text-align:left}
.st2 tr.qy td:first-child{border-left:3px solid var(--gold)}.st2 tr.qn{opacity:.5}
.st2 tr:hover td{background:var(--s2)}
.gbg{background:var(--s3);color:var(--gold);padding:2px 6px;border-radius:3px;font-size:.65rem;font-weight:800}
.sec{font-size:.78rem;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;margin-top:22px;border-bottom:1px solid var(--border);padding-bottom:7px}
.sec:first-child{margin-top:0}
.st3{width:100%;border-collapse:collapse;font-size:.72rem}
.st3 th{background:var(--s2);color:var(--muted);padding:5px 10px;text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:.4px}
.st3 td{padding:7px 10px;border-bottom:1px solid var(--border)}
.st3 tr:hover td{background:var(--s2)}
.gname{font-weight:900;color:var(--gold);font-size:1rem}

/* BRACKET */
.bnote{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:10px 14px;font-size:.68rem;color:var(--muted);margin-bottom:14px;line-height:1.5}
.bnote strong{color:var(--draw-t)}
.bscroll{overflow-x:auto;overflow-y:visible;padding-bottom:20px;-webkit-overflow-scrolling:touch}
.bwrap{position:relative}
/* HTML bracket match cards */
.bcard{position:absolute;background:var(--s1);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-sizing:border-box}
.bcard.clickable{cursor:pointer}
.bcard.clickable:hover{border-color:var(--gold)}
.brow{display:flex;align-items:center;gap:5px;padding:4px 7px;font-size:.68rem;border-bottom:1px solid var(--border);overflow:hidden;white-space:nowrap}
.brow:last-of-type{border-bottom:none}
.brow.bwin{background:rgba(212,168,67,.13);font-weight:700}
.bflag{font-size:.9em;flex-shrink:0;width:16px;text-align:center}
.bname{flex:1;overflow:hidden;text-overflow:ellipsis;font-size:.66rem}
.btbd{color:var(--muted);font-style:italic;font-size:.62rem}
.bscore{font-weight:800;color:var(--gold);min-width:14px;text-align:right;font-size:.72rem}
.bdt{font-size:.56rem;color:var(--muted);padding:2px 7px;border-top:1px solid var(--border);background:var(--s2);display:flex;align-items:center;gap:4px}
.rlabel{position:absolute;text-align:center;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}

/* BRACKET INFO BUTTON */
.binfo-btn{position:absolute;top:2px;right:2px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.65rem;padding:1px 3px;border-radius:3px;line-height:1;z-index:2}
.binfo-btn:hover{color:var(--blue-t);background:var(--s3)}

/* CHAMPION */
.champ{text-align:center;padding:20px;background:linear-gradient(135deg,var(--s2),var(--s3));border:2px solid var(--gold);border-radius:12px;margin-bottom:16px}
.ch-t{font-size:2.5rem}.ch-n{font-size:1.2rem;color:var(--gold);font-weight:800;margin-top:8px}
.ch-l{font-size:.65rem;color:var(--muted);letter-spacing:2px;margin-top:4px;text-transform:uppercase}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--gold);border-radius:12px;padding:22px;min-width:310px;max-width:92vw}
.mtitle{color:var(--gold);font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;font-weight:800}
.anote{background:var(--draw-bg);border:1px solid rgba(202,138,4,.3);border-radius:6px;padding:7px 10px;font-size:.65rem;color:var(--draw-t);margin-bottom:12px;line-height:1.4}
.se{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.steam{flex:1;text-align:center}
.semoji{font-size:1.6rem}.slabel{font-size:.65rem;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px;margin:4px auto 0}
.sinp{width:58px;text-align:center;background:var(--s3);border:1px solid var(--border);color:var(--text);font-size:1.6rem;font-weight:800;border-radius:7px;padding:7px 4px}
.sinp:focus{outline:none;border-color:var(--gold)}
.sdash{font-size:1.4rem;color:var(--border)}
.macts{display:flex;gap:7px;flex-wrap:wrap}
.btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.72rem;font-weight:700;letter-spacing:.5px;transition:all .15s}
.bs{background:var(--gold);color:#0b0e17}.bs:hover{background:var(--gold2)}
.bd{background:var(--loss-bg);color:var(--loss-t);border:1px solid rgba(220,38,38,.3)}.bd:hover{background:rgba(220,38,38,.25)}
.bc{background:var(--s3);color:var(--muted);border:1px solid var(--border)}.bc:hover{color:var(--text);background:var(--s4)}

/* NOTIF */
.notif{position:fixed;bottom:18px;right:18px;background:var(--s2);border:1px solid var(--gold);color:var(--gold);padding:9px 16px;border-radius:8px;font-size:.75rem;font-weight:700;z-index:2000;transform:translateY(80px);transition:transform .3s;pointer-events:none;letter-spacing:.5px}
.notif.show{transform:translateY(0)}
.leg{font-size:.6rem;color:var(--muted);text-align:center;margin-top:10px}
.leg span{color:var(--draw-t)}

@media(max-width:600px){
  .tab{padding:10px}
  nav button{font-size:.6rem;padding:10px 3px}
  .groups-grid{grid-template-columns:1fr}
  .tnm{max-width:75px}.mn{max-width:60px!important}
}
</style>
</head>
<body>
<header>
  <div class="hl">
    <div class="htroph">🏆</div>
    <div><h1>Copa Mundial 2026</h1><p>USA · CANADÁ · MÉXICO &nbsp;|&nbsp; Tracker de resultados</p></div>
  </div>
  <button class="btn-reset" onclick="resetData()">↩ Reset</button>
</header>
<nav>
  <button class="active" onclick="showTab('grupos',this)">⚽ Grupos</button>
  <button onclick="showTab('clasif',this)">✅ Clasificados</button>
  <button onclick="showTab('cuadro',this)">🗓 Cuadro</button>
</nav>
<div id="tab-grupos" class="tab active"></div>
<div id="tab-clasif"  class="tab"></div>
<div id="tab-cuadro" class="tab"></div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mtitle" id="mtitle">Resultado</div>
    <div class="anote" id="anote" style="display:none">⚠️ Marcador <strong>estimado</strong>. Ingresá el resultado real.</div>
    <div class="se">
      <div class="steam"><div class="semoji" id="mf1">🏳️</div><div class="slabel" id="mn1">Equipo A</div></div>
      <input type="number" class="sinp" id="ms1" min="0" max="99" value="0">
      <div class="sdash">–</div>
      <input type="number" class="sinp" id="ms2" min="0" max="99" value="0">
      <div class="steam"><div class="semoji" id="mf2">🏳️</div><div class="slabel" id="mn2">Equipo B</div></div>
    </div>
    <div class="macts">
      <button class="btn bs" onclick="saveResult()">💾 Guardar</button>
      <button class="btn bd" onclick="clearResult()">🗑 Borrar</button>
      <button class="btn bc" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>
<div class="notif" id="notif">✓ Guardado</div>

<script>

// ═══ CÁLCULOS ═══
function calcGroup(g){
  const teams=GROUPS[g];
  const s=teams.map((n,i)=>({n,i,pts:0,pj:0,v:0,e:0,d:0,gf:0,gc:0,gd:0}));
  for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){
    const r=results[`${g}_${i}_${j}`];if(r===undefined)continue;
    s[i].pj++;s[j].pj++;s[i].gf+=r.s1;s[i].gc+=r.s2;s[j].gf+=r.s2;s[j].gc+=r.s1;
    if(r.s1>r.s2){s[i].pts+=3;s[i].v++;s[j].d++;}
    else if(r.s1<r.s2){s[j].pts+=3;s[j].v++;s[i].d++;}
    else{s[i].pts++;s[i].e++;s[j].pts++;s[j].e++;}
    s[i].gd=s[i].gf-s[i].gc;s[j].gd=s[j].gf-s[j].gc;
  }
  s.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.n.localeCompare(b.n));
  return s;
}
let _allSt=null,_thirds=null;
function getAllStandings(){_allSt={};for(const g of Object.keys(GROUPS))_allSt[g]=calcGroup(g);return _allSt;}
function getThirds(all){
  const t=Object.keys(GROUPS).map(g=>({...all[g][2],group:g}));
  t.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.group.localeCompare(b.group));
  _thirds=t;return t;
}

// ═══ HELPERS ═══
function fl(n){return n?n.split(' ')[0]:'🏳️'}
function nm(n){return n?n.split(' ').slice(1).join(' '):''}
function gdc(v){return v>0?'gd-p':v<0?'gd-n':'gd-z'}
function slotTeam(s,all,thirds){
  if(s.t==='1')return all[s.g][0].n;
  if(s.t==='2')return all[s.g][1].n;
  if(s.t==='3')return thirds[s.r-1]?.n||'TBD';
  return'TBD';
}
function slotLabel(s){
  if(s.t==='1')return`1°${s.g}`;if(s.t==='2')return`2°${s.g}`;if(s.t==='3')return`3°#${s.r}`;return'?';
}

// ═══ RENDER CUADRO ═══
function buildBracketMatches(all,thirds){
  const bm={};
  function winner(id,h,a){const r=bracket[id];if(!r)return null;return r.s1>r.s2?h:r.s1<r.s2?a:h+'†';}
  // R32 — llenado automático desde standings
  R32.forEach(m=>{
    bm[m.id]={h:slotTeam(m.h,all,thirds),a:slotTeam(m.a,all,thirds),hl:slotLabel(m.h),al:slotLabel(m.a),res:bracket[m.id]||null};
  });
  // R16
  KOP.r16.forEach(([x,y],i)=>{
    const id=`r16_${i+1}`;
    const ph=bm[`r32_${x}`],pa=bm[`r32_${y}`];
    bm[id]={h:winner(`r32_${x}`,ph.h,ph.a)||'TBD',a:winner(`r32_${y}`,pa.h,pa.a)||'TBD',res:bracket[id]||null};
  });
  // QF
  KOP.qf.forEach(([x,y],i)=>{
    const id=`qf_${i+1}`;
    const ph=bm[`r16_${x}`],pa=bm[`r16_${y}`];
    bm[id]={h:winner(`r16_${x}`,ph.h,ph.a)||'TBD',a:winner(`r16_${y}`,pa.h,pa.a)||'TBD',res:bracket[id]||null};
  });
  // SF
  KOP.sf.forEach(([x,y],i)=>{
    const id=`sf_${i+1}`;
    const ph=bm[`qf_${x}`],pa=bm[`qf_${y}`];
    bm[id]={h:winner(`qf_${x}`,ph.h,ph.a)||'TBD',a:winner(`qf_${y}`,pa.h,pa.a)||'TBD',res:bracket[id]||null};
  });
  // Final
  {const ph=bm['sf_1'],pa=bm['sf_2'];
   bm['fn']={h:winner('sf_1',ph.h,ph.a)||'TBD',a:winner('sf_2',pa.h,pa.a)||'TBD',res:bracket['fn']||null};}
  return bm;
}

function renderBracket(){
  const all=getAllStandings();const thirds=getThirds(all);
  const bm=buildBracketMatches(all,thirds);
  _bmCache=bm;

  // Layout
  const MW=164,MH=54,DH=16,TOTAL_MH=MH+DH,HGAP=52,IN=5,BTW=18,HALF=40,LBL=22;
  // R32 Y positions — pares adyacentes alimentan el mismo R16
  // Orden visual: [P74,P77, P73,P75, P76,P78, P79,P80 | P83,P84, P81,P82, P86,P88, P85,P87]
  const r32Y=[];let y=0;
  for(let i=0;i<16;i++){
    r32Y.push(y);
    const gap=i===7?HALF:i%2===0?IN:BTW; // HALF = separador llave alta/baja
    y+=TOTAL_MH+gap;
  }
  const totalH=y-BTW+TOTAL_MH+LBL+10;
  function midY(arr,a,b){return(arr[a]+arr[b]+TOTAL_MH)/2-TOTAL_MH/2;}
  const r16Y=[],qfY=[],sfY=[];
  for(let i=0;i<8;i++)r16Y.push(midY(r32Y,i*2,i*2+1));
  for(let i=0;i<4;i++)qfY.push(midY(r16Y,i*2,i*2+1));
  for(let i=0;i<2;i++)sfY.push(midY(qfY,i*2,i*2+1));
  const fnY=[(sfY[0]+sfY[1]+TOTAL_MH)/2-TOTAL_MH/2];
  const allY=[r32Y,r16Y,qfY,sfY,fnY];
  const colX=[0,1,2,3,4].map(i=>i*(MW+HGAP));
  const totalW=5*MW+4*HGAP+2;

  // SVG connector lines
  let svgLines=`<svg style="position:absolute;top:${LBL}px;left:0;pointer-events:none;overflow:visible" width="${totalW}" height="${totalH}" xmlns="http://www.w3.org/2000/svg">`;
  function addConn(fromY,toY,ci){
    const fx=colX[ci]+MW,tx=colX[ci+1],mid=(fx+tx)/2;
    toY.forEach((ty,i)=>{
      const ay=fromY[i*2]+TOTAL_MH/2,by=fromY[i*2+1]+TOTAL_MH/2,cy=ty+TOTAL_MH/2;
      svgLines+=`<path d="M${fx},${ay} H${mid} V${by} M${mid},${ay} V${by}" fill="none" stroke="rgba(44,49,80,.95)" stroke-width="1.5"/>`;
      svgLines+=`<line x1="${mid}" y1="${cy}" x2="${tx}" y2="${cy}" stroke="rgba(44,49,80,.95)" stroke-width="1.5"/>`;
    });
  }
  addConn(r32Y,r16Y,0);addConn(r16Y,qfY,1);addConn(qfY,sfY,2);addConn(sfY,fnY,3);
  // Separador visual entre llave alta y baja
  const sepY=r32Y[7]+TOTAL_MH+HALF/2;
  svgLines+=`<line x1="0" y1="${sepY}" x2="${totalW}" y2="${sepY}" stroke="rgba(212,168,67,.2)" stroke-width="1" stroke-dasharray="4,4"/>`;
  svgLines+=`<text x="${colX[0]+MW/2}" y="${r32Y[0]-5}" text-anchor="middle" fill="rgba(212,168,67,.55)" font-size="8.5" font-family="system-ui" letter-spacing="1">⬆ LLAVE ALTA · SF Atlanta</text>`;
  svgLines+=`<text x="${colX[0]+MW/2}" y="${r32Y[8]-5}" text-anchor="middle" fill="rgba(212,168,67,.55)" font-size="8.5" font-family="system-ui" letter-spacing="1">⬇ LLAVE BAJA · SF Dallas</text>`;
  svgLines+='</svg>';

  // Orden de visualización — pares que alimentan el mismo R16 van juntos
  // Llave alta: P74+P77, P73+P75, P76+P78, P79+P80 → R16: P89,P90,P91,P92
  // Llave baja: P83+P84, P81+P82, P86+P88, P85+P87 → R16: P93,P94,P95,P96
  const RIDS=[
    ['r32_2','r32_5','r32_1','r32_3','r32_4','r32_6','r32_7','r32_8',
     'r32_11','r32_12','r32_9','r32_10','r32_14','r32_16','r32_13','r32_15'],
    ['r16_1','r16_2','r16_3','r16_4','r16_5','r16_6','r16_7','r16_8'],
    ['qf_1','qf_3','qf_2','qf_4'],   // qf display: high-bracket first, low-bracket second
    ['sf_1','sf_2'],
    ['fn']
  ];
  const RLBLS=['RONDA DE 32 · 28 Jun-3 Jul','OCTAVOS · 4-7 Jul','CUARTOS · 9-11 Jul','SEMIFINALES','FINAL · 19 Jul'];

  // Build HTML cards
  let cards='';

  // Round labels
  RIDS.forEach((_,ri)=>{
    cards+=`<div class="rlabel" style="left:${colX[ri]}px;top:0;width:${MW}px">${RLBLS[ri]}</div>`;
  });

  // Match cards
  RIDS.forEach((ids,ri)=>{
    ids.forEach((id,mi)=>{
      const m=bm[id];if(!m)return;
      const x=colX[ri],cypos=allY[ri][mi]+LBL;
      const {h,a,hl,al,res}=m;
      const hTBD=h==='TBD',aTBD=a==='TBD';
      const clickable=!(hTBD&&aTBD);
      const hWin=res&&res.s1>res.s2,aWin=res&&res.s1<res.s2;
      const hfl=hTBD?'':fl(h),afl=aTBD?'':fl(a);
      const hn=hTBD?(hl||'Por det.'):nm(h)||h;
      const an=aTBD?(al||'Por det.'):nm(a)||a;
      const hs=res!=null?res.s1:'',as_=res!=null?res.s2:'';
      const sched=BSH[id];
      const r32m=R32.find(m=>m.id===id);
      const pNum=sched?.p||(r32m?.p||'');
      const sdtxt=sched?`${pNum?pNum+' · ':''}📅 ${sched.d}`:null;
      cards+=`<div class="bcard${clickable?' clickable':''}" style="left:${x}px;top:${cypos}px;width:${MW}px;height:${TOTAL_MH}px"${clickable?` onclick="openBracketMatch('${id}')"`:''}>`
        +`<div class="brow${hWin?' bwin':''}" style="height:${MH/2}px"><span class="bflag">${hfl}</span><span class="bname${hTBD?' btbd':''}">${hn.length>17?hn.slice(0,16)+'…':hn}</span>${res!=null?`<span class="bscore">${hs}</span>`:''}</div>`
        +`<div class="brow${aWin?' bwin':''}" style="height:${MH/2}px;border-bottom:none"><span class="bflag">${afl}</span><span class="bname${aTBD?' btbd':''}">${an.length>17?an.slice(0,16)+'…':an}</span>${res!=null?`<span class="bscore">${as_}</span>`:''}</div>`
        +(sdtxt?`<div class="bdt">${sdtxt}</div>`:`<div class="bdt" style="color:var(--s4)">📅 Fecha por confirmar</div>`)
        +(clickable?`<button class="binfo-btn" onclick="event.stopPropagation();showBracketInfo(event,'${id}')" title="Info partido">ℹ</button>`:'')
        +`</div>`;
    });
  });

  // Champion
  const fn=bm['fn'];let champHtml='';
  if(fn?.res&&fn.h!=='TBD'&&fn.a!=='TBD'){
    const ch=fn.res.s1>fn.res.s2?fn.h:fn.res.s1<fn.res.s2?fn.a:null;
    if(ch)champHtml=`<div class="champ"><div class="ch-t">🏆</div><div class="ch-n">${fl(ch)} ${nm(ch)||ch}</div><div class="ch-l">Campeón Mundial 2026</div></div>`;
  }

  document.getElementById('tab-cuadro').innerHTML=`${champHtml}
    <div class="bnote"><strong>⚠ Nota:</strong> Los emparejamientos de la Ronda de 32 son <strong>aproximados</strong> (basados en la estructura FIFA WC 2026). Los equipos se actualizan automáticamente con cada resultado. Los slots de 3° mejor se asignan por ranking actual. Hacé clic en cualquier partido de la fase eliminatoria para cargar el resultado.</div>
    <div class="bscroll"><div class="bwrap" style="width:${totalW}px;height:${totalH}px">${svgLines}${cards}</div></div>`;
}

function showBracketInfo(ev,id){
  ev.stopPropagation();
  const existing=document.getElementById('bip_'+id);
  if(existing){existing.remove();return;}
  document.querySelectorAll('[id^="bip_"]').forEach(e=>e.remove());
  const s=BSH[id];if(!s)return;
  const card=ev.currentTarget.closest('.bcard');
  const info=document.createElement('div');
  info.id='bip_'+id;
  info.style.cssText='position:absolute;z-index:10;background:var(--s1);border:1px solid var(--gold);border-radius:6px;padding:8px 12px;font-size:.65rem;color:var(--muted);white-space:nowrap;top:100%;left:0;margin-top:4px;pointer-events:none;line-height:1.8';
  info.innerHTML=`📅 ${s.d}${s.t?` &nbsp; 🕐 ${s.t} ART`:''}`;
  if(card){card.style.position='absolute';card.appendChild(info);setTimeout(()=>info.remove(),3000);}
}

// ═══ NOTIFY ═══
function notify(msg){const n=document.getElementById('notif');n.textContent=msg;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2500);}

// ═══ MAIN ═══
function renderAll(){renderGroups();renderClasificados();renderBracket();}
loadData();renderAll();
</script>
</body>
</html>
